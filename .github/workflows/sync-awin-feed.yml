# Importe le(s) flux produits Awin dans la table Supabase `products`.
# Utilise les secrets GitHub : AWIN_FEED_URL (un seul marchand) ou AWIN_FEEDS
# (plusieurs, prioritaire — une ligne "clé=url" par marchand, voir
# docs/multi-source-catalogue.md), SUPABASE_DB_PASSWORD, SUPABASE_PROJECT_REF,
# GEMINI_API_KEY (optionnel — sans lui, le tagging retombe sur l'heuristique par mots-clés,
# moins fiable : voir docs/tagging-morphologie.md).
#
# Secrets attendus dans l'Environment "prod" (Settings → Environments →
# prod). Le job doit déclarer environment: prod pour y avoir accès.

name: Sync Awin feed

on:
  schedule:
    - cron: '0 6,18 * * *' # 2x par jour (06h et 18h UTC)
  workflow_dispatch: {} # bouton "Run workflow" pour lancer à la main

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pg
        run: npm install --no-save pg

      - name: Import Awin feed(s) into Supabase
        env:
          AWIN_FEED_URL: ${{ secrets.AWIN_FEED_URL }}
          AWIN_FEEDS: ${{ secrets.AWIN_FEEDS }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/import-awin.js
