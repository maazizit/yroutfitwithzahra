# Déploie automatiquement toutes les Edge Functions (supabase/functions/*)
# à chaque changement poussé sur main, et synchronise le secret GEMINI_API_KEY
# côté Supabase (nécessaire pour que tag-morphology / ask-zahra fonctionnent).
#
# Secrets utilisés : SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, GEMINI_API_KEY
# (GEMINI_API_KEY optionnel — sans lui cette étape est simplement sautée).
#
# SUPABASE_ACCESS_TOKEN : Supabase Dashboard → Account → Access Tokens → New token.

name: Supabase — deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy every function under supabase/functions/
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -e
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$PROJECT_REF" ]; then
            echo "SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF manquants — configure les secrets d'environnement." >&2
            exit 1
          fi
          for dir in supabase/functions/*/; do
            name="$(basename "$dir")"
            echo "→ déploiement de $name"
            supabase functions deploy "$name" --project-ref "$PROJECT_REF"
          done

      - name: Nettoyage — supprimer sync-awin-feed (obsolète, remplacée par scripts/import-awin.js)
        if: ${{ !hashFiles('supabase/functions/sync-awin-feed/**') }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase functions delete sync-awin-feed --project-ref "$PROJECT_REF" || true

      - name: Synchroniser le secret GEMINI_API_KEY côté Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY non configurée — étape sautée (le tagging retombera sur l'heuristique)."
            exit 0
          fi
          supabase secrets set GEMINI_API_KEY="$GEMINI_API_KEY" --project-ref "$PROJECT_REF"
