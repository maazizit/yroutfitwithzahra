# Applique automatiquement les migrations SQL (supabase/migrations/*.sql)
# sur la base Supabase à chaque changement poussé sur main.
# Toutes les migrations sont écrites en idempotent (`if not exists`,
# `add column if not exists`...), donc rejouer tout le dossier à chaque run
# est sûr — pas besoin de suivre "quelle migration a déjà tourné".
#
# Secrets utilisés (Environment "prod") :
#   SUPABASE_DB_URL (recommandé) — connexion "Session pooler" copiée depuis
#     Supabase → Connect → Session pooler (compatible IPv4 : la connexion
#     directe db.<ref>.supabase.co est IPv6-only et injoignable depuis les
#     runners GitHub Actions — "Network is unreachable").
#   ou, à défaut : SUPABASE_DB_PASSWORD + SUPABASE_PROJECT_REF (connexion
#     directe — ne fonctionnera pas en CI sans IPv4 add-on Supabase).

name: Supabase — migrate database

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/schema.sql'
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Run migrations
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -e
          if [ -n "$DB_URL" ]; then
            CONN="$DB_URL"
          elif [ -n "$PGPASSWORD" ] && [ -n "$PROJECT_REF" ]; then
            CONN="host=db.$PROJECT_REF.supabase.co port=5432 dbname=postgres user=postgres sslmode=require"
          else
            echo "SUPABASE_DB_URL (recommandé) ou SUPABASE_DB_PASSWORD+SUPABASE_PROJECT_REF manquants." >&2
            exit 1
          fi
          shopt -s nullglob
          files=(supabase/migrations/*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "Aucune migration à appliquer."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "→ $f"
            psql "$CONN" -v ON_ERROR_STOP=1 -f "$f"
          done
          echo "Migrations appliquées : ${#files[@]} fichier(s)."
