# Applique automatiquement les migrations SQL (supabase/migrations/*.sql)
# sur la base Supabase à chaque changement poussé sur main.
# Toutes les migrations sont écrites en idempotent (`if not exists`,
# `add column if not exists`...), donc rejouer tout le dossier à chaque run
# est sûr — pas besoin de suivre "quelle migration a déjà tourné".
#
# Secrets utilisés (Environment "prod") :
#   SUPABASE_DB_URL (recommandé) — Session pooler (IPv4, compatible GitHub Actions)
#   ou SUPABASE_DB_PASSWORD + SUPABASE_PROJECT_REF (connexion directe IPv6 — échoue en CI)

name: Supabase — migrate database

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/schema.sql'
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pg
        run: npm install --no-save pg

      - name: Run migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_DB_URL:-}" ] && [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "SUPABASE_DB_URL (recommandé) ou SUPABASE_DB_PASSWORD+SUPABASE_PROJECT_REF manquants." >&2
            exit 1
          fi
          shopt -s nullglob
          files=(supabase/migrations/*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "Aucune migration à appliquer."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "→ $f"
            node scripts/run-migration.js "$f"
          done
          echo "Migrations appliquées : ${#files[@]} fichier(s)."
